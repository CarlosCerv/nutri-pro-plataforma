<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=3" />
    <link rel="icon" type="image/svg+xml" href="/brand-icon.svg?v=3" />
    <link rel="apple-touch-icon" href="/brand-icon.svg?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NutriPro — El software premium que tu consulta merece. Gestión de pacientes, dietas profesionales, expedientes clínicos y PDFs de alto nivel para nutriólogos." />
    <meta name="theme-color" content="#090E1A" />
    <script>
      (function () {
        var theme = localStorage.getItem('nutripro-theme') || 'dark';
        var root = document.documentElement;
        root.classList.remove('dark', 'light');
        root.classList.add(theme);
        root.style.colorScheme = theme;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'light' ? '#F4F7FB' : '#090E1A');
      })();
    </script>

    <!-- Google Fonts: Playfair Display + DM Sans + DM Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

    <title>NutriPro — El software que tu consulta merece</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
