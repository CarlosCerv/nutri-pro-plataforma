<!doctype html>
<html lang="es" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=3" />
    <link rel="icon" type="image/svg+xml" href="/brand-icon.svg?v=3" />
    <link rel="apple-touch-icon" href="/brand-icon.svg?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NutriPro, plataforma sencilla para gestionar pacientes, dietas, citas y reportes de nutricion." />
    <meta name="theme-color" content="#F5F5F7" />
    <script>
      (function () {
        var theme = localStorage.getItem('nutripro-theme-v3') || 'light';
        var root = document.documentElement;
        root.classList.remove('dark', 'light');
        root.classList.add(theme);
        root.style.colorScheme = theme;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', '#F5F5F7');
      })();
    </script>

    <title>NutriPro | Plataforma de nutricion</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
